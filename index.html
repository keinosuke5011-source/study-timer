<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リアルタイム学習ルーム - Ultimate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f; --bg2: #16161a; --bg3: #1e1e24;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text1: #f0f0f2; --text2: #9898a8; --text3: #5a5a6a;
      --accent: #1dbe8a; --warn: #e05a30;
      --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
    }

    body {
      background: var(--bg); color: var(--text1);
      font-family: 'Sora', sans-serif; min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 1rem 1rem 4rem; transition: background 0.3s, color 0.3s;
    }

    .app { width: 100%; max-width: 480px; position: relative; }
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding: 0 4px; }
    .app-header h1 { font-size: 14px; font-weight: 400; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; }
    
    .music-toggle-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .music-toggle-btn:hover { border-color: var(--accent); color: var(--text1); }

    /* Account Mini Bar */
    .account-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .account-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar { font-size: 16px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: var(--bg3); border-radius: 50%; }

    /* Tabs */
    .tab-bar { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 4px; gap: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 10px 0; background: transparent; border: none; border-radius: var(--radius-md); font-family: 'Sora', sans-serif; font-size: 11px; color: var(--text3); cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tab svg { width: 18px; height: 18px; }
    .tab.active { background: var(--bg3); color: var(--text1); font-weight: 600; border: 1px solid var(--border2); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* === TIMER === */
    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1rem; }
    .preset-btn { padding: 5px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer; }
    .preset-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .custom-inputs { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 1rem; }
    .custom-inputs input { width: 54px; padding: 6px; text-align: center; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text1); font-family: 'DM Mono', monospace; font-size: 16px; outline: none; }
    .ring-wrap { position: relative; width: 210px; height: 210px; margin: 0 auto 1.25rem; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bg3); stroke-width: 8; }
    .ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s linear; }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .clock-big { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 300; letter-spacing: -2px; }
    .clock-status { font-size: 10px; letter-spacing: 2px; color: var(--text3); }
