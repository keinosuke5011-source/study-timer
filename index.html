<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプル学習タイマー ＆ チャット（ランキング付）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --bg2: #16161a;
      --bg3: #1e1e24;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text1: #f0f0f2;
      --text2: #9898a8;
      --text3: #5a5a6a;
      --accent: #1dbe8a;
      --accent2: #0f8a62;
      --warn: #e05a30;
      --warn2: #b03e1e;
      --gold: #ffd700;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text1);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .app-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-top: 0.5rem;
    }
    .app-header h1 {
      font-size: 15px;
      font-weight: 400;
      color: var(--text3);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 4px;
      gap: 4px;
      margin-bottom: 1.75rem;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab svg { width: 14px; height: 14px; }
    .tab.active {
      background: var(--bg3);
      color: var(--text1);
      font-weight: 600;
      border: 1px solid var(--border2);
    }
    .tab:hover:not(.active) { color: var(--text2); }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* === TIMER === */
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .preset-btn {
      padding: 5px 16px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 20px;
      color: var(--text2);
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
    .preset-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .custom-inputs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.5rem;
    }
    .custom-inputs input {
      width: 58px;
      padding: 7px 6px;
      text-align: center;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text1);
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-inputs input:focus { border-color: var(--accent); }
    .custom-inputs .sep {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      color: var(--text3);
    }
    .custom-inputs .unit {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1px;
    }
    .inp-grp { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 1.5rem;
    }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bg3); stroke-width: 8; }
    .ring-track { fill: none; stroke: var(--border); stroke-width: 1; }
    .ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s linear, stroke 0.4s; }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .clock-big {
      font-family: 'DM Mono', monospace;
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
    }
    .clock-status {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* Controls */
    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .ctrl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .ctrl-btn svg { width: 18px; height: 18px; }
    .ctrl-btn:hover { border-color: var(--text2); color: var(--text1); }
    .ctrl-btn.primary {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .ctrl-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .ctrl-btn.primary.running { background: var(--warn); border-color: var(--warn); }
    .ctrl-btn.primary.running:hover { background: var(--warn2); border-color: var(--warn2); }
